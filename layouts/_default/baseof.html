<!doctype html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{- partial "head.html" . }}
</head>
<body class="{{ block "body-class" . }}{{ end }}">
  <a href="#main-content" class="skip-link">Skip to content</a>

  {{- partial "navbar.html" . }}

  <main class="site-main" id="main-content">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . }}
</body>
</html>
